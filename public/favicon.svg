<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="cyanGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>
    <linearGradient id="phoneBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Phone Body -->
  <rect x="6" y="2" width="20" height="28" rx="4" fill="url(#phoneBg)" stroke="url(#cyanGoldGrad)" stroke-width="2"/>

  <!-- Screen Surface -->
  <rect x="8" y="5" width="16" height="20" rx="2" fill="#090d16"/>

  <!-- Lightning Bolt Symbol (⚡ IC / Fast Service) -->
  <path d="M17 6L10 16h6l-2 10 9-11h-6l2-9z" fill="url(#cyanGoldGrad)" filter="url(#glow)"/>

  <!-- Speaker / Home Indicator -->
  <circle cx="16" cy="27.5" r="1" fill="#06b6d4"/>
</svg>